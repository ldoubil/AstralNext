name: Precompile Rust Binaries

on:
  workflow_dispatch:
    description: '手动触发预编译 Rust 二进制文件'

jobs:
  Precompile:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 'stable'

      - name: Install GTK (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - name: Precompile (macOS)
        if: matrix.os == 'macOS-latest'
        run: dart run build_tool.dart precompile-binaries -v --manifest-dir=../../rust --repository=ldoubil/AstralNext
        working-directory: packages/astral_rust_core/cargokit/build_tool
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}

      - name: Precompile (Windows)
        if: matrix.os == 'windows-latest'
        run: dart run build_tool.dart precompile-binaries -v --manifest-dir=../../rust --repository=ldoubil/AstralNext
        working-directory: packages/astral_rust_core/cargokit/build_tool
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}

      - name: Precompile (Linux with Android)
        if: matrix.os == 'ubuntu-latest'
        run: dart run build_tool.dart precompile-binaries -v --manifest-dir=../../rust --repository=ldoubil/AstralNext --android-sdk-location=/usr/local/lib/android/sdk --android-ndk-version=28.2.13676358 --android-min-sdk-version=21
        working-directory: packages/astral_rust_core/cargokit/build_tool
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}