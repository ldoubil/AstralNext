name: Precompile Rust Binaries

on:
  workflow_dispatch:
    description: '手动触发预编译 Rust 二进制文件'

jobs:
  Precompile:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 'stable'

      # cargokit RustBuilder 写死了 `rustup run stable cargo`，只认
      # stable/beta/nightly channel。runner image 上 stable=1.94.1 不满足
      # easytier 2.6.4 / guarden 0.1.3 的 MSRV，必须升级 stable 本身。
      # `dtolnay/rust-toolchain@stable` 会重新装 stable channel 拿到 ≥1.95。
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install GTK and Protobuf (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev protobuf-compiler

      - name: Windows native build prerequisites
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "CARGOKIT_VERBOSE=1"
          Add-Content -Path $env:GITHUB_ENV -Value "CARGO_BUILD_JOBS=2"
          New-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' `
            -Name 'LongPathsEnabled' -Value 1 -PropertyType DWORD -Force | Out-Null
          choco install protoc nasm --yes --no-progress
          $machinePath = [Environment]::GetEnvironmentVariable('Path', 'Machine')
          $userPath = [Environment]::GetEnvironmentVariable('Path', 'User')
          $env:Path = "$machinePath;$userPath"
          $nasmDir = 'C:\Program Files\NASM'
          if (Test-Path $nasmDir) {
            Add-Content -Path $env:GITHUB_PATH -Value $nasmDir
            $env:Path = "$nasmDir;$env:Path"
          }
          rustc -V
          protoc --version

      # 兜底：清掉 packages/astral_rust_core/rust 下可能残留的旧 target/ 与
      # Cargo 缓存索引（修改 easytier 依赖来源后避免读到旧本地路径）。
      - name: Clean Rust cache
        run: cargo clean
        working-directory: packages/astral_rust_core/rust
        shell: bash

      - name: Install dependencies
        run: dart pub get
        working-directory: packages/astral_rust_core/cargokit/build_tool

      - name: Precompile (Windows)
        if: matrix.os == 'windows-latest'
        run: dart run bin/build_tool.dart precompile-binaries -v --manifest-dir=../../rust --repository=ldoubil/AstralNext
        working-directory: packages/astral_rust_core/cargokit/build_tool
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}

      - name: Precompile (Linux with Android)
        if: matrix.os == 'ubuntu-latest'
        run: dart run bin/build_tool.dart precompile-binaries -v --manifest-dir=../../rust --repository=ldoubil/AstralNext --android-sdk-location=/usr/local/lib/android/sdk --android-ndk-version=28.2.13676358 --android-min-sdk-version=21
        working-directory: packages/astral_rust_core/cargokit/build_tool
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}