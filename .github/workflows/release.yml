name: 🎯 Complete Release Pipeline

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      is_prerelease:
        description: 'Is this a pre-release?'
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

jobs:
  # ========== Build All Apps (Rust compiled automatically) ==========
  build-apps:
    name: 🚀 Build Applications
    uses: ./.github/workflows/build-apps.yml

  # ========== Create Release ==========
  create-release:
    name: 📦 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-apps]
    if: always()
    
    permissions:
      contents: write
    
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: astral*
          merge-multiple: true

      - name: 📋 List release assets
        run: |
          echo "=== Release Assets ==="
          find release-assets -type f | sort
          echo ""
          echo "Total files: $(find release-assets -type f | wc -l)"

      - name: 🏷️ Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: 📝 Generate changelog
        id: changelog
        run: |
          if [ -f "CHANGELOG.md" ]; then
            CHANGELOG=$(cat CHANGELOG.md)
          else
            CHANGELOG="## What's Changed\n\nSee commit history for details."
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ github.event.inputs.is_prerelease || false }}
          files: |
            release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Release complete
        run: |
          echo "🎉 Release ${{ steps.version.outputs.version }} created successfully!"
          echo "Assets uploaded:"
          find release-assets -type f -exec basename {} \; | sort
